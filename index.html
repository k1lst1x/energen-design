
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>AI Assistant Web App Design (Copy)</title>
      <meta name="description" content="Provides AUES University users instant AI-powered assistance for campus info, events, appointments, and navigation via voice or text chat." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        (function () {
          var path = window.location.pathname;
          if (path.indexOf('/hall') === 0 && !window.location.hash) {
            window.history.replaceState(null, '', '/#' + path + window.location.search);
          }
        })();
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
